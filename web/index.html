<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THMES Web Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background: #1e1e1e; overflow: hidden; }
        header { padding: 8px 14px; background: #252526; color: #d4d4d4;
                 border-bottom: 1px solid #333; font-family: -apple-system, sans-serif; }
        header h1 { margin: 0; font-size: 14px; font-weight: 600; }
        header span { font-size: 11px; color: #8a8a8a; }
        #terminal { width: 100%; height: calc(100% - 38px); padding: 6px; box-sizing: border-box; }
    </style>
</head>
<body>
    <header><h1>THMES Web Terminal</h1>
        <span>the real thmes CLI, served locally over a PTY — nothing leaves your machine</span>
    </header>
    <div id="terminal"></div>

    <script>
        const term = new Terminal({
            cursorBlink: true,
            fontFamily: "Menlo, Monaco, 'Courier New', monospace",
            fontSize: 13,
            theme: { background: '#1e1e1e', foreground: '#d4d4d4', cursor: '#ffffff' }
        });
        // Fit the terminal to the window (falls back gracefully if the addon is absent).
        let fit = null;
        try { fit = new FitAddon.FitAddon(); term.loadAddon(fit); } catch (e) {}
        term.open(document.getElementById('terminal'));
        if (fit) { fit.fit(); window.addEventListener('resize', () => fit.fit()); }

        // Connect to the PTY bridge on the SAME host (works over LAN too), default port 8766.
        const ws = new WebSocket('ws://' + (location.hostname || 'localhost') + ':8766');
        ws.onopen    = () => term.write('\x1b[90m[connected — starting thmes…]\x1b[0m\r\n');
        ws.onmessage = e  => term.write(e.data);
        ws.onclose   = () => term.write('\r\n\x1b[90m[connection closed]\x1b[0m\r\n');
        ws.onerror   = () => term.write('\r\n\x1b[31m[WebSocket error — is `thmes-web` running?]\x1b[0m\r\n');
        // Browser keystrokes → server → PTY
        term.onData(d => { if (ws.readyState === WebSocket.OPEN) ws.send(d); });
    </script>
</body>
</html>
